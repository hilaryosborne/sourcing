# Phase D conformance infrastructure — real services the adapters are certified against.
# Start a service with: docker compose -f conformance/docker-compose.yml up -d <service>
services:
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
